<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>忆江南</title>
<style>
  :root{
    --ink:#1f1f1f;
    --muted:#5f5f5f;
    --line:#e2d2b7;
    --accent:#2f6fed;
    --bg1:#e6f2fb;
    --bg2:#f8f1e2;
    --shadow: 0 18px 40px rgba(0,0,0,.12);
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    overflow:hidden;
    font-family: ui-sans-serif, system-ui, -apple-system, "PingFang SC","Microsoft YaHei", Arial;
    color:var(--ink);
    background:
      radial-gradient(1100px 520px at 18% 10%, #fff2d2, transparent 60%),
      radial-gradient(980px 520px at 86% 18%, #e8f4ff, transparent 58%),
      linear-gradient(180deg, var(--bg1), var(--bg2));
  }

  .scene{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;
  }

  /* 水墨山体（SVG） */
  .mountains{
    position:absolute;
    inset:0;
    pointer-events:none;
    opacity:.88;
  }

  /* 雾气层 */
  .mist{
    position:absolute;
    inset:-20%;
    background:
      radial-gradient(closest-side at 18% 32%, rgba(255,255,255,.62), transparent 62%),
      radial-gradient(closest-side at 62% 24%, rgba(255,255,255,.48), transparent 64%),
      radial-gradient(closest-side at 78% 56%, rgba(255,255,255,.38), transparent 60%);
    filter: blur(2px);
    animation: mistMove 20s linear infinite;
    pointer-events:none;
    opacity:.95;
  }
  @keyframes mistMove{
    0%{ transform: translateX(-3%) translateY(0%); }
    50%{ transform: translateX(3%) translateY(-1%); }
    100%{ transform: translateX(-3%) translateY(0%); }
  }

  /* 河流 */
  .river{
    position:absolute;
    left:0; right:0; bottom:0;
    height:40vh;
    background:
      linear-gradient(180deg, rgba(126,200,227,.88), rgba(95,174,211,.92));
    overflow:hidden;
  }
  /* 水波 */
  .river::after{
    content:"";
    position:absolute;
    inset:0;
    background:
      repeating-linear-gradient(
        90deg,
        rgba(255,255,255,.12) 0px,
        rgba(255,255,255,.12) 2px,
        transparent 2px,
        transparent 42px
      );
    opacity:.55;
    transform: translateX(0);
    animation: waterMove 9s linear infinite;
  }
  @keyframes waterMove{
    0%{ transform: translateX(0); }
    100%{ transform: translateX(-260px); }
  }

  /* 柳树（更像“墨点”风格） */
  .willow{
    position:absolute;
    left:7%;
    bottom:38vh;
    width:160px;
    height:240px;
    transform-origin: 40% 80%;
    filter: drop-shadow(0 10px 16px rgba(0,0,0,.10));
    animation: sway 4.2s ease-in-out infinite alternate;
    opacity:.9;
  }
  @keyframes sway{
    from{ transform: rotate(-2.2deg) translateY(0); }
    to{ transform: rotate(2.4deg) translateY(-2px); }
  }

  /* 小船 */
  .boat{
    position:absolute;
    bottom:18vh;
    left:-240px;
    width:180px;
    height:64px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    font-size:52px;
    animation: boatMove 12s linear forwards;
    filter: drop-shadow(0 12px 16px rgba(0,0,0,.12));
  }
  .wake{
    width:56px;
    height:10px;
    border-radius:999px;
    background: rgba(255,255,255,.55);
    filter: blur(.2px);
    animation: wake 1.1s ease-in-out infinite;
  }
  @keyframes wake{
    0%{ transform: scaleX(.9); opacity:.45; }
    50%{ transform: scaleX(1.1); opacity:.65; }
    100%{ transform: scaleX(.9); opacity:.45; }
  }
  @keyframes boatMove{
    0%{ transform: translateX(0); }
    100%{ transform: translateX(calc(100vw + 520px)); }
  }

  /* 标题（毛笔感：阴影+轻微抖动） */
  .titleWrap{
    position:relative;
    z-index:2;
    padding:18px 18px 16px;
    border-radius:18px;
    background: rgba(255,255,255,.55);
    border:1px solid rgba(226,210,183,.75);
    box-shadow: var(--shadow);
    backdrop-filter: blur(6px);
    text-align:center;
    min-width: min(560px, 92vw);
  }
  .title{
    margin:0;
    font-size: clamp(40px, 6vw, 64px);
    font-weight: 1000;
    letter-spacing: 6px;
    opacity:0;
    transform: translateY(8px);
    animation: titleIn 1.4s ease forwards;
    animation-delay: .8s;
    text-shadow: 0 10px 20px rgba(0,0,0,.10);
  }
  .subtitle{
    margin:10px 0 0;
    font-size: clamp(14px, 2.2vw, 18px);
    color: var(--muted);
    opacity:0;
    transform: translateY(6px);
    animation: titleIn 1.2s ease forwards;
    animation-delay: 1.8s;
    letter-spacing:.6px;
  }
  @keyframes titleIn{
    to{ opacity:1; transform: translateY(0); }
  }

  .enterRow{
    margin-top:14px;
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    opacity:0;
    transform: translateY(6px);
    animation: titleIn 1.1s ease forwards;
    animation-delay: 2.8s;
  }

  button{
    border:none;
    cursor:pointer;
    border-radius: 12px;
    padding:12px 16px;
    font-weight: 900;
    letter-spacing:.2px;
    font-size: 14px;
  }
  .btnPrimary{
    background: var(--accent);
    color:#fff;
    box-shadow: 0 10px 20px rgba(47,111,237,.22);
  }
  .btnPrimary:hover{ filter: brightness(.98); }
  .btnGhost{
    background: rgba(255,255,255,.75);
    color: var(--ink);
    border: 1px solid rgba(226,210,183,.9);
  }

  .tip{
    margin-top:10px;
    font-size: 12px;
    color: var(--muted);
    opacity:.92;
  }

  /* 右下角标识（比赛展示更像产品，不写“终极版”等作业痕迹） */
  .mark{
    position:absolute;
    right:14px;
    bottom:12px;
    z-index:2;
    font-size:12px;
    color: rgba(95,95,95,.85);
    background: rgba(255,255,255,.55);
    border: 1px solid rgba(226,210,183,.7);
    padding:6px 10px;
    border-radius:999px;
    backdrop-filter: blur(6px);
  }

  @media (prefers-reduced-motion: reduce){
    .mist,.river::after,.boat,.willow{ animation:none !important; }
    .title,.subtitle,.enterRow{ animation:none !important; opacity:1 !important; transform:none !important; }
  }
</style>
</head>
<body>
  <div class="scene">
    <!-- 水墨山体 -->
    <svg class="mountains" viewBox="0 0 1440 900" preserveAspectRatio="none" aria-hidden="true">
      <defs>
        <linearGradient id="m1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="rgba(40,60,70,.22)"/>
          <stop offset="1" stop-color="rgba(40,60,70,0)"/>
        </linearGradient>
        <linearGradient id="m2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="rgba(30,50,60,.18)"/>
          <stop offset="1" stop-color="rgba(30,50,60,0)"/>
        </linearGradient>
      </defs>
      <path d="M0,520 C180,420 320,460 480,410 C640,355 770,410 920,370 C1070,330 1220,370 1440,300 L1440,900 L0,900 Z" fill="url(#m1)"/>
      <path d="M0,600 C220,520 380,560 540,520 C700,480 830,540 980,500 C1130,460 1260,500 1440,430 L1440,900 L0,900 Z" fill="url(#m2)"/>
    </svg>

    <div class="mist"></div>

    <!-- 柳树（用简单SVG更像水墨） -->
    <svg class="willow" viewBox="0 0 200 300" aria-hidden="true">
      <path d="M95 35 C78 90 78 130 78 175 C78 225 70 260 58 290" fill="none" stroke="rgba(40,60,70,.55)" stroke-width="10" stroke-linecap="round"/>
      <path d="M105 35 C122 90 122 130 122 175 C122 225 130 260 142 290" fill="none" stroke="rgba(40,60,70,.45)" stroke-width="8" stroke-linecap="round"/>
      <!-- 柳叶线条 -->
      <g stroke="rgba(34,90,80,.35)" stroke-width="4" stroke-linecap="round">
        <path d="M65 120 C40 140 35 170 22 195"/>
        <path d="M70 155 C45 175 40 205 28 230"/>
        <path d="M75 190 C52 210 45 240 35 265"/>
        <path d="M135 120 C160 140 165 170 178 195"/>
        <path d="M130 155 C155 175 160 205 172 230"/>
        <path d="M125 190 C148 210 155 240 165 265"/>
      </g>
    </svg>

    <!-- 标题卡片 -->
    <div class="titleWrap">
      <h1 class="title">忆江南</h1>
      <p class="subtitle">古诗词数字微课堂</p>
      <div class="enterRow">
        <button class="btnPrimary" onclick="enterClass()">进入课堂</button>
        <button class="btnGhost" onclick="skipAnim()">跳过开场</button>
      </div>
      <div class="tip">10 秒后将自动进入课堂</div>
    </div>

    <!-- 小船 -->
    <div class="boat" aria-hidden="true">
      <span>⛵</span><span class="wake"></span>
    </div>

    <div class="river"></div>

    <div class="mark">《忆江南》课堂活动</div>
  </div>

<script>
  function enterClass(){
    window.location.href = "game.html";
  }
  function skipAnim(){
    window.location.href = "game.html";
  }
  // 10秒自动进入
  const autoGo = setTimeout(()=> enterClass(), 10000);

  // 若用户很快点击进入，防止重复跳
  window.addEventListener("beforeunload", ()=> clearTimeout(autoGo));
</script>
</body>
</html>
