<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>忆江南课堂</title>

<style>
body{
margin:0;
background:#000;
overflow:hidden;
}

video{
width:100vw;
height:100vh;
object-fit:cover;
}

.skip{
position:absolute;
top:20px;
right:20px;
background:rgba(0,0,0,0.5);
color:white;
padding:10px 18px;
border-radius:20px;
font-size:16px;
}
</style>
</head>

<body>

<video id="intro" autoplay muted playsinline>
<source src="video/opening.mp4" type="video/mp4">
</video>

<div class="skip" onclick="enter()">进入课堂</div>

<script>

const v=document.getElementById("intro")

v.onended=function(){
window.location.href="poem.html"
}

function enter(){
window.location.href="poem.html"
}

</script>

</body>
</html>
